---
name: Release

# Triggered by pushing a version tag (e.g. v0.1.0). This is the single
# tag-driven pipeline: it runs the quality gates, builds the sdist + wheel,
# publishes to PyPI via Trusted Publishing (OIDC — no stored token), and
# creates a GitHub Release with the built artifacts. Cutting a release is:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# One-time setup is documented in docs/RELEASING.md (PyPI Trusted Publisher +
# the `pypi` GitHub Environment).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run ruff check
        run: uv run ruff check .
      - name: Run ruff format --check
        run: uv run ruff format --check .
      - name: Run pyright
        run: uv run pyright src/
      - name: Run pytest
        run: uv run pytest

  build:
    name: build sdist + wheel
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          echo "tag=${tag} pyproject=${pkg}"
          if [ "${tag}" != "${pkg}" ]; then
            echo "::error::Tag v${tag} does not match pyproject version ${pkg}. Bump pyproject.toml or retag."
            exit 1
          fi
      - name: Build sdist and wheel
        run: uv run python -m build
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # A GitHub Environment named `pypi` gates the publish step and is the
    # subject of the PyPI Trusted Publisher configuration (see docs/RELEASING.md).
    environment:
      name: pypi
      url: https://pypi.org/p/docline
    permissions:
      id-token: write  # OIDC token for PyPI Trusted Publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  github-release:
    name: github release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release for the tag
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
