---
name: CI

# CI is PAUSED while we pace GitHub Actions minute consumption (private
# repo + macOS matrix = ~19.5 billable min/run; PR #62 alone burned ~273
# min across its fix cycles, and the 3,000 monthly allotment was
# exhausted on 2026-06-10).
#
# To re-enable for everyday PR / push validation, restore these triggers
# (paths-ignore per item 3 is already inlined so restoring is copy-paste-ready):
#   on:
#     pull_request:
#       paths-ignore: ['.backlogit/**', 'docs/**', '**/*.md', 'README.md']
#     push:
#       branches: [main]
#       paths-ignore: ['.backlogit/**', 'docs/**', '**/*.md', 'README.md']
#
# Cost-reduction changes (each independent):
# 1. ✅ APPLIED — windows-latest dropped from matrix (~4 billable min/run).
# 2. ✅ APPLIED — macos-latest dropped from matrix (~10 billable min/run).
# 3. ✅ READY — paths-ignore inlined into the restore template above so doc-/
#    backlog-only pushes skip the matrix once PR/push triggers are restored.
# 4. ✅ APPLIED — the build + test jobs carry a PR-title guard that skips PRs
#    whose title starts with 'chore:' or 'docs:' (inert on non-PR events).
#
# Current triggers below intentionally fire only on release tags or
# explicit manual runs from the Actions tab.
on:
  workflow_dispatch: {}
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run ruff check
        run: uv run ruff check .

  format:
    name: ruff format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run pyright
        run: uv run pyright src/

  test:
    name: pytest (${{ matrix.os }})
    # Skip the heavy matrix for chore:/docs: PRs (title-based guard). Inert on
    # non-PR events (tags/releases/dispatch), where the PR title is empty.
    if: >-
      github.event_name != 'pull_request' ||
      (!startsWith(github.event.pull_request.title, 'chore:') &&
      !startsWith(github.event.pull_request.title, 'docs:'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Cost-conserving matrix:
        # - macos-latest removed (10x billing multiplier — single largest savings)
        # - windows-latest removed (2x multiplier; operator validates locally on Windows)
        # Restore by adding back: macos-latest, windows-latest
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run pytest
        run: uv run pytest

  build:
    name: sdist + wheel
    # Skip the build for chore:/docs: PRs (title-based guard). Inert on non-PR
    # events (tags/releases/dispatch), where the PR title is empty.
    if: >-
      github.event_name != 'pull_request' ||
      (!startsWith(github.event.pull_request.title, 'chore:') &&
      !startsWith(github.event.pull_request.title, 'docs:'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Build sdist and wheel
        run: uv run python -m build
