---
name: CI

# CI runs the quality gates (ruff lint, ruff format, pyright, pytest,
# sdist+wheel) on push to main and on pull requests, plus manual
# workflow_dispatch runs from the Actions tab.
#
# Cost controls (GitHub Actions minutes; private repo) — each independent:
# 1. ✅ APPLIED — windows-latest dropped from matrix (~4 billable min/run).
# 2. ✅ APPLIED — macos-latest dropped from matrix (~10 billable min/run).
# 3. ✅ APPLIED — a `changes` job diffs the PR/push and gates the heavy jobs;
#    doc-/backlog-only changes skip lint/format/typecheck/test/build entirely.
# 4. ✅ APPLIED — path-based, in-job gating (NOT a PR-title guard): test + build
#    (and lint/format/type) run only when a non-doc (code/config) path changes,
#    so a chore:/docs: PR that touches code is still fully tested.
# 5. ✅ APPLIED — the workflow always triggers (no paths-ignore) and `ci-gate`
#    always reports, so the required check is satisfied even on doc-only PRs
#    (heavy jobs skipped); require `ci gate` in branch protection.
#
# Release tags (v*) are handled by release.yml, which runs these same quality
# gates before building and publishing — so CI is not duplicated on release.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Detect non-doc (code/config) changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Manual runs always build/test.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            range="${PR_BASE_SHA}...${HEAD_SHA}"
          elif [ -z "${PUSH_BEFORE:-}" ] || [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # New branch / unknown base — build to be safe.
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          else
            range="${PUSH_BEFORE}...${HEAD_SHA}"
          fi
          files="$(git diff --name-only "$range")"
          echo "Changed files:"; printf '%s\n' "$files"
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              .backlogit/*|docs/*|.autoharness/*|*.md) : ;;  # doc/backlog only
              *) code=true ;;                                # any other path is code
            esac
          done < <(printf '%s\n' "$files")
          echo "Result: code=$code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  lint:
    name: ruff lint
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run ruff check
        run: uv run ruff check .

  format:
    name: ruff format check
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: pyright
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run pyright
        run: uv run pyright src/

  test:
    name: pytest (${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Cost-conserving matrix:
        # - macos-latest removed (10x billing multiplier — single largest savings)
        # - windows-latest removed (2x multiplier; operator validates locally on Windows)
        # Restore by adding back: macos-latest, windows-latest
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run pytest
        run: uv run pytest

  build:
    name: sdist + wheel
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Build sdist and wheel
        run: uv run python -m build

  # Always-reporting aggregate gate. Require THIS job in branch protection
  # instead of the title-guarded test/build: when test/build are skipped for a
  # chore:/docs: PR, GitHub reports them "skipped" — which a required check
  # treats as not-successful and would block the merge. ci-gate always runs and
  # passes unless a needed job actually failed or was cancelled (skipped is OK).
  ci-gate:
    name: ci gate
    if: always()
    needs: [changes, lint, format, typecheck, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results="${{ needs.changes.result }} ${{ needs.lint.result }} ${{ needs.format.result }} ${{ needs.typecheck.result }} ${{ needs.test.result }} ${{ needs.build.result }}"
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required job did not succeed: $r"
              exit 1
            fi
          done
          echo "All required jobs passed or were intentionally skipped."
