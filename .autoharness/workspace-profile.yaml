# .autoharness/workspace-profile.yaml
schema_version: "1.0.0"
generated_at: "2026-05-30T00:09:53-07:00"
workspace_path: "<local-workspace-path>"

languages:
  primary: "python"
  secondary: []

frameworks:
  list:
    - "fastapi"
    - "pydantic"
  mcp_sdk: "mcp-python"
  mcp_transport: "stdio"

primary_stack_pack: "mcp-server"
stack_packs:
  - "cli-tool"
  - "mcp-server"

build:
  tool: null
  command: null

test:
  runner: "pytest"
  command: "pytest"
  directory: "tests"

lint:
  tool: "ruff"
  command: "ruff check ."

format:
  tool: "ruff"
  command: "ruff format ."

ci:
  platform: "github-actions"
  pipeline_steps: []
  quality_gates: []

structure:
  source_layout: "src"
  test_layout: "tests"
  doc_layout: "docs"

runtime_surfaces:
  cli: true
  web_ui: false
  public_api: true
  background_jobs: false
  browser_tooling: []
  deployment_manifests: []

runtime_validation:
  validator_manifest:
    surfaces:
      - surface: "cli"
        adapter_hint: "command"
        probe_hints:
          - "docline --help"
          - "docline --manifest"
        manual_checkpoints: []
      - surface: "api"
        adapter_hint: "auto"
        probe_hints:
          - "MCP tools/list response"
        manual_checkpoints:
          - "Verify MCP server responds to initialize handshake"
  validation_expectations:
    required: true
    surfaces_expected:
      - "cli"
      - "api"
    minimum_verdict: "PASS"
    preserve_invariants:
      - "CLI and MCP tool parity"
      - "Schema validation produces identical results via both interfaces"
    release_blockers:
      - "CLI --manifest output must match MCP tools/list schema"
  releasability:
    required: true
    status_when_satisfied: "READY"
    required_evidence:
      - "CLI smoke test passes"
      - "MCP initialize handshake succeeds"

conventions:
  code_style:
    linter: "ruff"
    formatter: "ruff"
    type_checker: "pyright"
    pre_commit: false
  git:
    branch_naming: "conventional"
    commit_style: "conventional-commits"
    default_branch: "main"
    pr_template: false
  documentation:
    api_docs: null
    adrs: false
    changelog: false
    design_docs: "docs/design-docs"
    product_specs: "docs/product-specs"

distribution: null

tools:
  markdownlint: true
  markdownlint_config: null

harness_recommendations:
  preset: "full"
  primary_stack_pack: "mcp-server"
  stack_packs:
    - "cli-tool"
    - "mcp-server"
  capability_packs:
    - "agent-engram"
    - "backlogit"
    - "strict-safety"
  install_layers:
    - "constitution"
    - "agents-md"
    - "instructions"
    - "agents"
    - "skills"
    - "policies"
    - "prompts"
    - "backlog"
    - "docs"
  recommendation_reasons:
    preset:
      - "Greenfield project with MCP server + CLI dual interface requires comprehensive agent support"
      - "Complex document ingestion pipeline with multiple extraction engines benefits from full deliberation and review workflows"
      - "Engram and backlogit already configured — full preset maximizes integration"
    capability_packs:
      - "agent-engram: Engram MCP server detected in .mcp.json, .vscode/mcp.json, and .cursor/mcp.json with .engram/ state directory present"
      - "backlogit: backlogit MCP server configured and .backlogit/ directory with full config present"
      - "agent-intercom: Recommended for remote operator approval during long-running pipeline operations"
      - "strict-safety: MCP server exposes public API surface; schema validation is security-sensitive"
    install_layers:
