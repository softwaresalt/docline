schema_version: "1.0.0"
tool_name: "backlogit"
tool_type: "both"
directory: ".backlogit"

mcp_server:
  command: "backlogit mcp"
  transport: "stdio"

cli:
  binary: "backlogit"

operations:
  create_task:
    mcp_tool: "backlogit_create_item"
    cli_command: "backlogit add --type {{artifact_type}} --title {{title}}"
    params:
      title: "title"
      type: "artifact_type"
      status: "status"
      description: "description"
      parent_id: "parent_id"
      labels: "labels"
      assignee: "assigned_to"

  list_tasks:
    mcp_tool: "backlogit_list_items"
    cli_command: "backlogit list"
    params:
      type: "type"
      status: "status"
      assignee: "assigned_to"

  get_task:
    mcp_tool: "backlogit_get_item"
    cli_command: "backlogit get {{id}}"
    params:
      task_id: "id"
      section: "section"

  update_task:
    mcp_tool: "backlogit_update_item"
    cli_command: "backlogit update {{id}}"
    params:
      task_id: "id"
      title: "title"
      status: "status"
      description: "description"
      labels: "labels"
      assignee: "assigned_to"
      priority: "priority"

  move_task:
    mcp_tool: "backlogit_move_item"
    cli_command: "backlogit move {{id}} --status {{status}}"
    params:
      task_id: "id"
      status: "status"

  delete_task:
    mcp_tool: "backlogit_delete_item"
    cli_command: "backlogit delete {{id}} --force"
    params:
      task_id: "id"

  search_tasks:
    mcp_tool: "backlogit_search_items"
    cli_command: "backlogit search {{query}}"
    params:
      query: "query"
      limit: "limit"

  complete_task:
    mcp_tool: "backlogit_move_item"
    cli_command: "backlogit move {{id}} --status done"
    params:
      task_id: "id"
      status: "status"

  query:
    mcp_tool: "backlogit_query_sql"
    cli_command: "backlogit query {{sql}}"
    params:
      sql: "sql"

  sync_index:
    mcp_tool: "backlogit_sync_index"
    cli_command: "backlogit sync"

  append_comment:
    mcp_tool: "backlogit_append_comment"
    params:
      task_id: "item_id"
      actor: "actor"
      comment: "comment"

  log_telemetry:
    mcp_tool: "backlogit_log_telemetry"
    params:
      event_type: "event_type"

  save_memory:
    mcp_tool: "backlogit_save_memory"
    params:
      key: "key"
      summary: "summary"

  create_checkpoint:
    mcp_tool: "backlogit_create_checkpoint"
    params:
      state_dump: "state_dump"

  list_checkpoints:
    mcp_tool: "backlogit_list_checkpoints"
    cli_command: "backlogit checkpoint list"
    params:
      consumer_id: "consumer_id"
      status: "status"
      shipment_id: "shipment_id"
      feature_id: "feature_id"
      max_age_hours: "max_age_hours"

  get_checkpoint:
    mcp_tool: "backlogit_get_checkpoint"
    cli_command: "backlogit checkpoint get {{filename}}"
    params:
      filename: "filename"

  resolve_checkpoint:
    mcp_tool: "backlogit_resolve_checkpoint"
    cli_command: "backlogit checkpoint resolve {{filename}}"
    params:
      filename: "filename"

  poll_hook_events:
    mcp_tool: "backlogit_poll_hook_events"
    params:
      consumer_id: "consumer_id"

  ack_hook_events:
    mcp_tool: "backlogit_ack_hook_events"
    params:
      consumer_id: "consumer_id"
      seq: "seq"

  get_queue:
    mcp_tool: "backlogit_get_queue"
    cli_command: "backlogit queue view"
    params:
      type: "type"
      status: "status"
      assigned_to: "assigned_to"
      limit: "limit"
      offset: "offset"
      group_by: "group_by"

  add_dependency:
    mcp_tool: "backlogit_add_dependency"
    cli_command: "backlogit dep add {{task_id}} {{depends_on}} --type {{dep_type}}"
    params:
      task_id: "item_id"
      depends_on: "depends_on"
      dep_type: "dep_type"

  remove_dependency:
    mcp_tool: "backlogit_remove_dependency"
    cli_command: "backlogit dep remove {{task_id}} {{depends_on}}"
    params:
      task_id: "item_id"
      depends_on: "depends_on"

  get_dependencies:
    mcp_tool: "backlogit_get_dependencies"
    cli_command: "backlogit dep list {{task_id}}"
    params:
      task_id: "id"
      reverse: "reverse"

  track_commit:
    mcp_tool: "backlogit_track_commit"
    cli_command: "backlogit update {{task_id}} --commit {{sha}}"
    params:
      task_id: "item_id"
      sha: "sha"
      message: "message"
      author: "author"

  create_shipment:
    mcp_tool: "backlogit_create_shipment"
    cli_command: "backlogit shipment create --title {{title}} --items {{items}}"
    params:
      title: "title"
      items: "items"

  get_shipment:
    mcp_tool: "backlogit_get_shipment"
    cli_command: "backlogit shipment get {{id}}"
    params:
      shipment_id: "id"

  list_shipments:
    mcp_tool: "backlogit_list_shipments"
    cli_command: "backlogit shipment list"
    params:
      status: "status"

  claim_shipment:
    mcp_tool: "backlogit_claim_shipment"
    cli_command: "backlogit shipment claim {{id}}"
    params:
      shipment_id: "id"

  ship_shipment:
    mcp_tool: "backlogit_ship_shipment"
    cli_command: "backlogit shipment ship {{id}}"
    params:
      shipment_id: "id"
      sha: "sha"
      message: "message"
      author: "author"

  add_to_shipment:
    mcp_tool: "backlogit_add_to_shipment"
    params:
      shipment_id: "shipment_id"
      item_id: "item_id"

  return_blocked:
    mcp_tool: "backlogit_return_blocked"
    cli_command: "backlogit shipment return-blocked --shipment {{shipment_id}} --item {{item_id}} --reason {{reason}}"
    params:
      shipment_id: "shipment_id"
      item_id: "item_id"
      reason: "reason"

  # --- Stash management ---

  stash:
    mcp_tool: "backlogit_stash"
    cli_command: "backlogit stash add --text {{text}}"
    params:
      text: "text"
      kind: "kind"
      priority: "priority"

  stash_edit:
    mcp_tool: "backlogit_stash_edit"
    params:
      stash_id: "stash_id"
      text: "text"
      kind: "kind"
      priority: "priority"

  stash_get:
    mcp_tool: "backlogit_stash_get"
    params:
      stash_id: "stash_id"

  stash_remove:
    mcp_tool: "backlogit_stash_remove"
    params:
      stash_id: "stash_id"

  stash_archive:
    mcp_tool: "backlogit_stash_archive"
    params:
      stash_id: "stash_id"

  fetch_stash:
    mcp_tool: "backlogit_fetch_stash"
    cli_command: "backlogit stash list"
    params:
      kind: "kind"
      priority: "priority"
      group_by_priority: "group_by_priority"

  harvest_stash:
    mcp_tool: "backlogit_harvest_stash"
    cli_command: "backlogit stash harvest"
    params:
      stash_id: "stash_id"
      priority: "priority"
      artifact_type: "artifact_type"
      title: "title"
      description: "description"
      parent_id: "parent_id"
      status: "status"

  # --- Deliberation ---

  deliberate:
    mcp_tool: "backlogit_deliberate"
    params:
      stash_id: "stash_id"
      title: "title"
      problem_frame: "problem_frame"
      options: "options"
      chosen_direction: "chosen_direction"
      notes: "notes"
      open_questions: "open_questions"

  # --- Semantic links ---

  add_link:
    mcp_tool: "backlogit_add_link"
    cli_command: "backlogit link add {{source_id}} {{target_id}} --type {{link_type}}"
    params:
      source_id: "source_id"
      target_id: "target_id"
      link_type: "link_type"

  remove_link:
    mcp_tool: "backlogit_remove_link"
    cli_command: "backlogit link remove {{source_id}} {{target_id}} --type {{link_type}}"
    params:
      source_id: "source_id"
      target_id: "target_id"
      link_type: "link_type"

  get_links:
    mcp_tool: "backlogit_get_links"
    cli_command: "backlogit link list {{id}}"
    params:
      id: "id"
      link_type: "link_type"

  # --- Lifecycle ---

  archive_item:
    mcp_tool: "backlogit_archive_item"
    cli_command: "backlogit archive {{id}}"
    params:
      id: "id"
      commit_sha: "commit_sha"

  adopt_item:
    mcp_tool: "backlogit_adopt_item"
    cli_command: "backlogit adopt {{item_id}} --parent {{new_parent_id}}"
    params:
      item_id: "item_id"
      new_parent_id: "new_parent_id"

  # --- Discovery & metadata ---

  get_metadata_catalog:
    mcp_tool: "backlogit_get_metadata_catalog"

  get_wit_metadata:
    mcp_tool: "backlogit_get_wit_metadata"
    params:
      type: "type"

  list_types:
    mcp_tool: "backlogit_list_types"

  list_templates:
    mcp_tool: "backlogit_list_templates"

  get_version:
    mcp_tool: "backlogit_get_version"

  export_command_map:
    mcp_tool: "backlogit_export_command_map"
    params:
      path: "path"
      format: "format"

  merge_sync:
    mcp_tool: "backlogit_merge_sync"
    params:
      dry_run: "dry_run"

  # --- Telemetry ---

  telemetry_harvest:
    mcp_tool: "backlogit_telemetry_harvest"
    params:
      copilot_path: "copilot_path"
      force: "force"
      since: "since"

  # --- Maintenance ---

  doctor:
    mcp_tool: "backlogit_doctor"
    cli_command: "backlogit doctor"
    params:
      check_orphans: "check_orphans"
      check_duplicates: "check_duplicates"
      fix_orphans: "fix_orphans"

  cleanup_checkpoints:
    mcp_tool: "backlogit_cleanup_checkpoints"
    cli_command: "backlogit checkpoint cleanup"
    params:
      retention_days: "retention_days"

field_mapping:
  task_id: "id"
  title: "title"
  status: "status"
  description: "description"
  parent_id: "parent_id"
  labels: "labels"
  assignee: "assigned_to"
  priority: "priority"
  artifact_type: "artifact_type"

status_values:
  queued: "queued"
  active: "active"
  done: "done"
  blocked: "blocked"

features:
  sql_query: true
  milestones: false
  documents: false
  telemetry: true
  telemetry_harvest: true
  memory: true
  checkpoints: true
  comments: true
  definition_of_done: false
  workflow_guides: false
  dependencies: true
  queue: true
  sections: true
  templates: true
  commit_tracking: true
  shipments: true
  stash: true
  semantic_links: true
  deliberation: true
  discovery: true
  lifecycle_hygiene: true
